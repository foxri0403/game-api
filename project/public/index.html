<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Sale</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- 🔷 상단 네비게이션 -->
<header class="header">
  <div class="logo">🎮 GameSale</div>

  <!-- 🔍 검색 -->
  <div>
    <input id="searchInput" type="text" placeholder="게임 검색..." class="search">
    <button onclick="searchSteam()" class="search-btn">검색</button>
  </div>

  <!-- 로그인 영역 -->
  <div class="nav-right">
    <div id="guestMenu">
      <a href="/login">로그인</a>
      <a href="/signup">회원가입</a>
    </div>

    <div id="userMenu" style="display:none;">
      <span id="username"></span>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>
</header>

<!-- 🔷 배너 -->
<section class="banner">
  <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" />
  <div class="banner-text">
    <h1>🔥 지금 할인 중!</h1>
    <p>최대 80% 할인 게임 확인</p>
  </div>
</section>

<!-- 🔷 검색 결과 -->
<section class="game-section">
  <h2>검색 결과</h2>
  <div id="gameList" class="game-grid"></div>
</section>

<script>
// 🔐 로그인 상태 체크
const guestMenu = document.getElementById("guestMenu");
const userMenu = document.getElementById("userMenu");
const username = document.getElementById("username");
const logoutBtn = document.getElementById("logoutBtn");

const savedUser = localStorage.getItem("loggedInUser");

if (savedUser) {
  const user = JSON.parse(savedUser);
  guestMenu.style.display = "none";
  userMenu.style.display = "flex";
  username.textContent = user.username + "님";
}

// 로그아웃
logoutBtn?.addEventListener("click", () => {
  localStorage.removeItem("loggedInUser");
  alert("로그아웃 완료");
  location.reload();
});


// 🔥 Steam 검색 함수
async function searchSteam() {
  const keyword = document.getElementById("searchInput").value.trim();

  if (!keyword) {
    alert("검색어 입력해");
    return;
  }

  const res = await fetch(`/api/steam/search?q=${encodeURIComponent(keyword)}`);
  const data = await res.json();

  const list = document.getElementById("gameList");

  if (!data.success) {
    list.innerHTML = `<p>오류: ${data.message || data.error}</p>`;
    return;
  }

  list.innerHTML = data.results.map(g => `
    <div class="game-card">
      <img src="${g.image}">
      <h3>${g.name}</h3>
      <p class="price">₩${(g.price / 100).toLocaleString()}</p>
      ${g.discount > 0 ? `<p class="discount">🔥 -${g.discount}%</p>` : ""}
    </div>
  `).join("");
}
</script>

</body>
</html>
