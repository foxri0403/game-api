<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Sale</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="logo">🎮 GameSale</div>

    <div>
      <input id="searchInput" type="text" placeholder="게임 검색..." class="search">
      <button id="searchBtn" class="search-btn">검색</button>
    </div>

    <div class="nav-right">
      <div id="guestMenu">
        <a href="/login">로그인</a>
        <a href="/signup">회원가입</a>
      </div>

      <div id="userMenu" style="display:none;">
        <span id="username"></span>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </header>

  <section class="banner">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" alt="banner">
    <div class="banner-text">
      <h1>🔥 지금 할인 중!</h1>
      <p>최대 80% 할인 게임 확인</p>
    </div>
  </section>

  <section class="game-section">
    <h2>검색 결과</h2>
    <div id="gameList" class="game-grid"></div>
  </section>

  <script src="/script.js"></script>
</body>
</html>
