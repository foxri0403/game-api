<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Sale</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- 🔷 상단 네비게이션 -->
<header class="header">
  <div class="logo">🎮 GameSale</div>

  <input type="text" placeholder="게임 검색..." class="search">

  <div class="nav-right">
    <div id="guestMenu">
      <a href="/login">로그인</a>
      <a href="/signup">회원가입</a>
    </div>

    <div id="userMenu" style="display:none;">
      <span id="username"></span>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>
</header>

<!-- 🔷 메인 배너 -->
<section class="banner">
  <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" />
  <div class="banner-text">
    <h1>🔥 지금 할인 중!</h1>
    <p>최대 80% 할인 게임 확인하세요</p>
  </div>
</section>

<!-- 🔷 게임 리스트 -->
<section class="game-section">
  <h2>추천 게임</h2>
  <div id="gameList" class="game-grid"></div>
</section>

<script>
const guestMenu = document.getElementById("guestMenu");
const userMenu = document.getElementById("userMenu");
const username = document.getElementById("username");
const logoutBtn = document.getElementById("logoutBtn");

const savedUser = localStorage.getItem("loggedInUser");

if (savedUser) {
  const user = JSON.parse(savedUser);
  guestMenu.style.display = "none";
  userMenu.style.display = "flex";
  username.textContent = user.username + "님";
}

logoutBtn?.addEventListener("click", () => {
  localStorage.removeItem("loggedInUser");
  location.reload();
});


// 🔥 게임 데이터 불러오기
async function loadGames() {
  const res = await fetch("/games");
  const data = await res.json();

  const gameList = document.getElementById("gameList");

  gameList.innerHTML = data.map(game => `
    <div class="game-card">
      <img src="https://via.placeholder.com/200x250">
      <h3>${game.title}</h3>
      <p>${game.genre || "장르 없음"}</p>
    </div>
  `).join("");
}

loadGames();
</script>

</body>
</html>
